<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:sec="http://www.thymeleaf/extras/spring-security"
        layout:decorate="~{layout1}">

<head>
    <meta charset="UTF-8">
    <title>Produits</title>
    <style>
        .page-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2d2d2d;
            margin-bottom: 1.5rem;
        }
        .btn-add {
            background-color: #2d2d2d;
            color: #f5f5f0;
            border: none;
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 0.88rem;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-add:hover {
            background-color: #444;
            color: #f5f5f0;
        }
        .btn-delete-bulk {
            background: transparent;
            border: 1px solid #c0392b;
            color: #c0392b;
            padding: 5px 16px;
            border-radius: 6px;
            font-size: 0.83rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-delete-bulk:hover {
            background: #c0392b;
            color: white;
        }
        .products-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }
        .products-table thead tr {
            background-color: #2d2d2d;
            color: #e8e8e0;
        }
        .products-table th {
            padding: 12px 16px;
            font-weight: 500;
            font-size: 0.83rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none;
        }
        .products-table td {
            padding: 13px 16px;
            border-bottom: 1px solid #efefeb;
            font-size: 0.92rem;
            color: #3a3a3a;
            vertical-align: middle;
        }
        .products-table tbody tr:last-child td {
            border-bottom: none;
        }
        .products-table tbody tr:hover {
            background-color: #fafaf7;
        }
        .stock-badge {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .stock-ok    { background: #e8f5e9; color: #2e7d32; }
        .stock-low   { background: #fdecea; color: #c62828; }
        .stock-mid   { background: #ede7f6; color: #4527a0; }
        .btn-edit {
            background: transparent;
            border: 1px solid #888;
            color: #555;
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 0.82rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-edit:hover {
            background: #2d2d2d;
            color: white;
            border-color: #2d2d2d;
        }
        .btn-del {
            background: transparent;
            border: 1px solid #e0e0e0;
            color: #999;
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-del:hover {
            border-color: #c0392b;
            color: #c0392b;
        }
        .flash-success {
            background: #f0faf0;
            border: 1px solid #c3e6cb;
            color: #2d6a4f;
            padding: 10px 16px;
            border-radius: 7px;
            font-size: 0.88rem;
            margin-bottom: 1.2rem;
        }
        .flash-warn {
            background: #fffbf0;
            border: 1px solid #ffe0a0;
            color: #7d5a00;
            padding: 10px 16px;
            border-radius: 7px;
            font-size: 0.88rem;
            margin-bottom: 1.2rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #aaa;
            font-size: 0.92rem;
        }
        input[type="checkbox"] {
            accent-color: #2d2d2d;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }
    </style>
</head>

<body>
<div layout:fragment="content">

    <!-- Flash messages -->
    <div th:if="${successMsg}" class="flash-success" th:text="${successMsg}"></div>
    <div th:if="${warnMsg}"    class="flash-warn"    th:text="${warnMsg}"></div>

    <!-- Toolbar -->
    <div class="toolbar">
        <span class="page-title">Produits</span>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin/newProduct}" class="btn-add">+ Nouveau produit</a>
    </div>

    <!-- Formulaire principal -->
    <form id="mainForm" method="post" th:action="@{/admin/deleteSelected}">
        <table class="products-table">
            <thead>
            <tr>
                <th sec:authorize="hasRole('ADMIN')" style="width:40px">
                    <input type="checkbox" id="selectAll" title="Tout sélectionner">
                </th>
                <th>ID</th>
                <th>Nom</th>
                <th>Prix</th>
                <th>Quantité</th>
                <th>Stock</th>
                <th sec:authorize="hasRole('ADMIN')">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${productList}">

                <td sec:authorize="hasRole('ADMIN')">
                    <input type="checkbox" name="selectedIds" th:value="${p.id}">
                </td>
                <td th:text="${p.id}" style="color:#aaa; font-size:0.82rem"></td>
                <td th:text="${p.name}" style="font-weight:500"></td>
                <td th:text="${#numbers.formatDecimal(p.price,1,2)} + ' DH'"></td>
                <td th:text="${p.quantity}"></td>

                <td>
                    <span th:if="${p.quantity >= 10}" class="stock-badge stock-ok">En stock</span>
                    <span th:if="${p.quantity < 10 and p.quantity >= 5}" class="stock-badge stock-mid">Limité</span>
                    <span th:if="${p.quantity < 5}"  class="stock-badge stock-low">Faible</span>
                </td>

                <td sec:authorize="hasRole('ADMIN')">
                    <div style="display:flex; gap:6px; align-items:center">
                        <a th:href="@{/admin/editProduct/{id}(id=${p.id})}" class="btn-edit">Éditer</a>
                        <form method="post" th:action="@{/admin/delete}"
                              onsubmit="return confirm('Supprimer ce produit ?')">
                            <input type="hidden" name="id" th:value="${p.id}">
                            <button type="submit" class="btn-del">Supprimer</button>
                        </form>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(productList)}">
                <td colspan="7" class="empty-state">Aucun produit enregistré.</td>
            </tr>
            </tbody>
        </table>

        <!-- Suppression en masse -->
        <div sec:authorize="hasRole('ADMIN')" style="margin-top:1rem">
            <button type="submit" class="btn-delete-bulk"
                    onclick="return confirm('Supprimer les produits sélectionnés ?')">
                Supprimer la sélection
            </button>
        </div>
    </form>

</div>

<th:block layout:fragment="scripts">
    <script>
        document.getElementById('selectAll')?.addEventListener('change', function () {
            document.querySelectorAll('input[name="selectedIds"]')
                .forEach(cb => cb.checked = this.checked);
        });
    </script>
</th:block>

</body>
</html>
