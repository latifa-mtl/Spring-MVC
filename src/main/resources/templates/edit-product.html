<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout1}">
<head>
    <meta charset="UTF-8">
    <title>Éditer un produit</title>
    <style>
        .form-card {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            padding: 2rem;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-card h5 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d2d2d;
            margin-bottom: 1.5rem;
        }
        .form-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 4px;
        }
        .form-control {
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.92rem;
            padding: 8px 12px;
            background: #fafaf7;
            transition: border 0.2s;
        }
        .form-control:focus {
            border-color: #2d2d2d;
            box-shadow: none;
            background: #fff;
        }
        .form-control.is-invalid { border-color: #c0392b; }
        .invalid-feedback { font-size: 0.8rem; color: #c0392b; }
        .btn-save {
            background: #2d2d2d;
            color: #f5f5f0;
            border: none;
            padding: 8px 22px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-save:hover { background: #444; }
        .btn-cancel {
            background: transparent;
            border: 1px solid #ccc;
            color: #777;
            padding: 8px 22px;
            border-radius: 6px;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-cancel:hover { border-color: #888; color: #444; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="form-card">
        <h5>Éditer le produit #<span th:text="${product.id}"></span></h5>
        <form method="post" th:action="@{/admin/updateProduct}" th:object="${product}">
            <input type="hidden" th:field="${product.id}">

            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text" class="form-control"
                       th:field="*{name}"
                       placeholder="Ex : Laptop Dell XPS"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>

                <div class="invalid-feedback" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Prix (DH)</label>
                <input type="number" step="0.01" class="form-control"
                       th:field="${product.price}"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="${product.price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantité</label>
                <input type="number" class="form-control"
                       th:field="${product.quantity}"
                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="${product.quantity}"></div>
            </div>

            <div style="display:flex; gap:10px; margin-top:1.5rem">
                <button type="submit" class="btn-save">Mettre à jour</button>
                <a th:href="@{/user/index}" class="btn-cancel">Annuler</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
