<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:sec="http://www.thymeleaf/extras/spring-security"
>
<head>
    <meta charset="UTF-8">
    <title>Product Manager</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css">
    <script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #f5f5f0;
            color: #2d2d2d;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar {
            background-color: #2d2d2d !important;
            border-bottom: 1px solid #1a1a1a;
        }
        .navbar-brand {
            color: #e8e8e0 !important;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .nav-link {
            color: #b0b0a8 !important;
            font-size: 0.9rem;
        }
        .nav-link:hover {
            color: #e8e8e0 !important;
        }
        .badge-role {
            font-size: 0.68rem;
            padding: 2px 7px;
            border-radius: 20px;
            background: #4a4a4a;
            color: #c0c0b8;
        }
        .container-main {
            max-width: 960px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">Product Manager</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navContent" style="border-color:#555">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/index}">Produits</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/newProduct}">+ Nouveau</a>
                </li>
            </ul>
            <ul class="navbar-nav align-items-center">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2"
                       href="#" role="button" data-bs-toggle="dropdown">
                        <span sec:authentication="name"></span>
                        <span class="badge-role" sec:authorize="hasRole('ADMIN')">admin</span>
                        <span class="badge-role" sec:authorize="!hasRole('ADMIN')">user</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item text-danger" th:href="@{/logout}">
                                Déconnexion
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-main" layout:fragment="content"></div>

<th:block layout:fragment="scripts"></th:block>

</body>
</html>
